# ============================================================
# application.properties — Elev8 Spring Boot Backend
# ============================================================

# Server
server.port=8080

# App name
spring.application.name=elev8-backend

# ─── CORS ───────────────────────────────────────────────────
# Configured in SecurityConfig.java

# ─── Twilio WhatsApp Bot ─────────────────────────────────────
# Get these from https://console.twilio.com
twilio.account.sid=YOUR_TWILIO_ACCOUNT_SID
twilio.auth.token=YOUR_TWILIO_AUTH_TOKEN
twilio.whatsapp.from=whatsapp:+14155238886

# ─── Firebase ────────────────────────────────────────────────
# Place your firebase-service-account.json in:
# src/main/resources/firebase-service-account.json
# (download from Firebase Console > Project Settings > Service Accounts)
# ⚠️ DO NOT commit this JSON file to git!

# ─── Logging ─────────────────────────────────────────────────
logging.level.com.elev8=DEBUG
logging.level.org.springframework.security=WARN

# ─── Spring Security ─────────────────────────────────────────
# Disable the default login page (we use Firebase Auth)
spring.security.user.name=admin
spring.security.user.password=CHANGE_THIS_PASSWORD

# ─── MySQL Database ──────────────────────────────────────────
# 1. Create the DB first:  CREATE DATABASE elev8db;
# 2. Replace YOUR_MYSQL_PASSWORD with your actual root password
spring.datasource.url=jdbc:mysql://localhost:3306/elev8db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ─── Razorpay Payment Gateway ────────────────────────────────
# Steps to get your keys:
#  1. Go to https://razorpay.com and create a free account
#  2. Dashboard → Settings → API Keys → Generate Test API Keys
#  3. Copy Key ID (starts with rzp_test_...) and Key Secret below
# ⚠️ DO NOT commit real keys to git! Use environment variables in production.
razorpay.key.id=rzp_test_YOUR_KEY_ID_HERE
razorpay.key.secret=YOUR_KEY_SECRET_HERE
